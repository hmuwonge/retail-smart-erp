apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

namespace: retail-smart-erp-staging

replicas:
  - name: retail-smart-erp
    count: 2

images:
  - name: retail-smart-app
    newTag: staging-${STAGING_TAG}

configMapGenerator:
  - name: retail-smart-erp-env
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=info
      - OTEL_ENABLED=true
      - DISABLE_RATE_LIMITING=false
      - SKIP_MIGRATIONS=false
      - REQUIRE_MIGRATIONS=true

patches:
  - target:
      kind: Deployment
      name: retail-smart-erp
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

  - target:
      kind: HorizontalPodAutoscaler
      name: retail-smart-erp
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 10
