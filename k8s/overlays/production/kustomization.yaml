apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

namespace: retail-smart-erp-production

replicas:
  - name: retail-smart-erp
    count: 3

images:
  - name: retail-smart-app
    newTag: ${PROD_TAG}

configMapGenerator:
  - name: retail-smart-erp-env
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - OTEL_ENABLED=true
      - DISABLE_RATE_LIMITING=false
      - SKIP_MIGRATIONS=false
      - REQUIRE_MIGRATIONS=true

patches:
  - target:
      kind: Deployment
      name: retail-smart-erp
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi

  - target:
      kind: HorizontalPodAutoscaler
      name: retail-smart-erp
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 70

  - target:
      kind: Ingress
      name: retail-smart-erp
    patch: |
      - op: add
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: replace
        path: /spec/tls/0/secretName
        value: retail-smart-erp-prod-tls
