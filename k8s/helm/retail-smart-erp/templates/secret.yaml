apiVersion: v1
kind: Secret
metadata:
  name: {{ include "retail-smart-erp.fullname" . }}-secret
  labels:
    {{- include "retail-smart-erp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.postgresUser | default "postgres" }}:{{ .Values.postgresql.auth.postgresPassword }}@{{ include "retail-smart-erp.fullname" . }}-postgresql-primary:5432/{{ .Values.postgresql.auth.database }}"
  DATABASE_URL_ADMIN: "postgresql://{{ .Values.postgresql.auth.postgresUser | default "postgres" }}:{{ .Values.postgresql.auth.postgresPassword }}@{{ include "retail-smart-erp.fullname" . }}-postgresql-primary:5432/{{ .Values.postgresql.auth.database }}"
  {{- end }}
  NEXTAUTH_URL: "https://{{ .Values.env.NEXT_PUBLIC_APP_DOMAIN }}"
  NEXTAUTH_SECRET: {{ .Values.nextauthSecret | default (randAlphaNum 32) | quote }}
  {{- if .Values.sentry.dsn }}
  SENTRY_DSN: {{ .Values.sentry.dsn | quote }}
  {{- end }}
  {{- if .Values.sso.enabled }}
  {{- if .Values.sso.providers.azuread.enabled }}
  AZURE_AD_CLIENT_ID: {{ .Values.sso.providers.azuread.clientId | quote }}
  AZURE_AD_CLIENT_SECRET: {{ .Values.sso.providers.azuread.clientSecret | quote }}
  AZURE_AD_TENANT_ID: {{ .Values.sso.providers.azuread.tenantId | quote }}
  {{- end }}
  {{- if .Values.sso.providers.okta.enabled }}
  OKTA_CLIENT_ID: {{ .Values.sso.providers.okta.clientId | quote }}
  OKTA_CLIENT_SECRET: {{ .Values.sso.providers.okta.clientSecret | quote }}
  OKTA_ISSUER: {{ .Values.sso.providers.okta.issuer | quote }}
  {{- end }}
  {{- if .Values.sso.providers.google.enabled }}
  GOOGLE_CLIENT_ID: {{ .Values.sso.providers.google.clientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.sso.providers.google.clientSecret | quote }}
  {{- end }}
  {{- end }}
