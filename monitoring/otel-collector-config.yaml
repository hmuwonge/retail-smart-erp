receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1000

  # Filter out noisy spans
  filter:
    spans:
      exclude:
        match_type: strict
        span_names:
          - 'healthcheck'
          - 'favicon'

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: retail_smart_erp

  logging:
    loglevel: debug

  # Optional: Add Jaeger exporter for trace visualization
  # jaeger:
  #   endpoint: jaeger:14250
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, filter]
      exporters: [logging]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging]
