services:
  postgres:
    image: postgres:15-alpine
    container_name: retail-smart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retail_smart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:    
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-smart-app:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3000
      WS_PORT: 3001

      DATABASE_URL: postgres://postgres:postgres@postgres:5432/retail_smart
      DATABASE_URL_ADMIN: postgres://postgres:postgres@postgres:5432/retail_smart
      DATABASE_APP_ROLE: app_user

      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production

      NEXT_PUBLIC_APP_NAME: Retail Smart ERP
      NEXT_PUBLIC_BASE_DOMAIN: localhost
      NEXT_PUBLIC_LANDING_DOMAIN: localhost
      NEXT_PUBLIC_APP_DOMAIN: app.localhost

      ALLOWED_HOSTS: localhost,app.localhost

      NEXT_PUBLIC_APP_URL: http://localhost:3000

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: