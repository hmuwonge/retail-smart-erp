services:
  postgres:
    image: postgres:15-alpine
    container_name: retail-smart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retail_smart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer connection pooler (reduces DB connection load)
  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: retail-smart-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/retail_smart
      POOL_MODE: transaction
      MAX_DB_CONNECTIONS: 20
      DEFAULT_POOL_SIZE: 20
      ADMIN_USERS: postgres
      AUTH_TYPE: trust
      LISTEN_PORT: 6432
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis cache for performance optimization
  redis:
    image: redis:7-alpine
    container_name: retail-smart-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # OpenTelemetry Collector (metrics & traces aggregation)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: retail-smart-otel
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
      - "8889:8889"   # Prometheus exporter
    depends_on:
      - prometheus

  # Prometheus (metrics storage)
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: retail-smart-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Grafana (metrics visualization)
  grafana:
    image: grafana/grafana:10.4.0
    container_name: retail-smart-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: http://localhost:3002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  app:    
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-smart-app:latest
    restart: unless-stopped
    expose:
      - "3000"
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3000
      WS_PORT: 3001

      # Database (via PgBouncer for connection pooling)
      DATABASE_URL: postgres://postgres:postgres@pgbouncer:6432/retail_smart
      DATABASE_URL_ADMIN: postgres://postgres:postgres@postgres:5432/retail_smart
      DATABASE_APP_ROLE: app_user

      # Redis cache
      REDIS_URL: redis://redis:6379

      # OpenTelemetry
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: retail-smart-erp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318

      # Sentry (error tracking)
      # SENTRY_DSN: https://your-sentry-dsn here

      # Rate limiting
      DISABLE_RATE_LIMITING: "false"

      NEXTAUTH_URL: http://app.localhost
      NEXTAUTH_SECRET: change-me-in-production

      NEXT_PUBLIC_APP_NAME: Retail Smart ERP
      NEXT_PUBLIC_BASE_DOMAIN: app.localhost
      NEXT_PUBLIC_LANDING_DOMAIN: app.localhost
      NEXT_PUBLIC_APP_DOMAIN: app.localhost

      ALLOWED_HOSTS: localhost,app.localhost

      NEXT_PUBLIC_APP_URL: http://app.localhost

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: retail-smart-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "3001:3001"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: retail-smart-network